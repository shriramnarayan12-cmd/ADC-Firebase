<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADC Smart Admin Portal</title>
    <link rel="manifest" href="/ADC-Firebase/manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <button id="installAppBtn" style="display:none; position:fixed; bottom:20px; right:20px; z-index:9999; padding:15px 20px; background-color:#800000; color:white; border:none; border-radius:8px; font-weight:bold; font-size:16px; box-shadow:0 4px 6px rgba(0,0,0,0.3); cursor:pointer;">
      📲 Install App
    </button>

    <script>
      let deferredPrompt;
      const installBtn = document.getElementById('installAppBtn');

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block'; 
      });

      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            installBtn.style.display = 'none';
          }
          deferredPrompt = null;
        }
      });
    </script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/ADC-Firebase/sw.js')
          .then(() => console.log('Service Worker Registered'));
      }
    </script>
  </body>
</html>
